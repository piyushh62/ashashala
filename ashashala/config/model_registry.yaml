# AshaShala Model Registry
#
# Single source of truth for model IDs. NEVER hardcode a model name in Python —
# always call model_for(role, provider).
#
# RE-VERIFY before each phase (NVIDIA IDs drift / get deprecated):
#   https://build.nvidia.com/models?pageSize=96&filters=publisher%3Anvidia
# Lines marked "# VERIFY" are NOT exercised in Phase 1 (health check only calls
# fast_chat) — confirm their exact IDs against the live catalog before the phase
# that first uses them (OCR/ASR/vision/safety -> Phase 2/3).
#
# Gemini rules (PROJECT_PROMPT.md Section 1):
#   - default          -> gemini-2.5-flash-lite
#   - reasoning/vision -> gemini-2.5-flash
#   - NEVER gemini-2.5-pro (paid). gemini-2.0-flash is shut down — do not use.

roles:
  # Fast chat — general tutoring, quick responses, intent classification.
  # Spec: Gemini primary, NVIDIA general model as fallback only.
  fast_chat:
    gemini: "gemini-2.5-flash-lite"
    nvidia_fallback: "meta/llama-3.1-8b-instruct"

  # Reasoning — evaluation/grading, lesson planning.
  reasoning:
    gemini: "gemini-2.5-flash"
    nvidia_fallback: "nvidia/llama-3.1-nemotron-ultra-253b-v1"   # VERIFY (Nemotron Ultra)

  # Multilingual Indic — Gujarati/Hindi/etc. Routed NVIDIA-direct (no Gemini).
  multilingual_indic:
    nvidia_primary: "sarvamai/sarvam-m"                          # Sarvam-M (Indic)
    nvidia_fallback: "meta/llama-4-maverick-17b-128e-instruct"   # VERIFY (Maverick multilingual)

  # Vision — diagrams, image understanding.
  vision:
    gemini: "gemini-2.5-flash"
    nvidia_fallback: "meta/llama-3.2-90b-vision-instruct"        # VERIFY

  # OCR — scanned/photographed pages. NVIDIA only.
  ocr:
    nvidia_primary: "baidu/paddleocr"                            # VERIFY (nemotron-ocr id drifts)

  # ASR — speech to text (multilingual incl. Hindi/Gujarati). NVIDIA only.
  asr:
    nvidia_primary: "nvidia/canary-1b-asr"                       # VERIFY (streaming ASR id)

  # Embeddings — RAG. Gemini text-embedding-004 = 768 dims (matches Qdrant).
  # NOTE: the NVIDIA fallback below outputs 1024 dims — do NOT mix it into the
  # same 768-dim collection. Resolve the embedding-dimension decision before
  # wiring the NVIDIA embedder in Phase 2. VERIFY id + dims.
  embeddings:
    gemini: "text-embedding-004"
    nvidia_fallback: "nvidia/nv-embedqa-e5-v5"                   # VERIFY (1024-dim!)

  # Safety — jailbreak detection. Takes a PRE-COMPUTED embedding, not raw text.
  safety_jailbreak:
    nvidia_primary: "nvidia/nemoguard-jailbreak-detect"         # VERIFY (deferred, Section 7.7)

# Provider configuration (informational; timeouts live in app/core/config.py).
providers:
  gemini:
    base_url: "https://generativelanguage.googleapis.com"
  nvidia:
    base_url: "https://integrate.api.nvidia.com/v1"
    rate_limit_rpm: 40   # Free tier
